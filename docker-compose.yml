version: "3"
services:
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "${SEARXNG_PORT:-8081}:8080"
    volumes:
      - ./settings.yml:/etc/searxng/settings.yml:ro
      - ./limiter.toml:/etc/searxng/limiter.toml:ro
    environment:
      - SEARXNG_BASE_URL=http://${SEARXNG_HOST:-0.0.0.0}:${SEARXNG_PORT:-8081}/
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY:-a9fbec65e807c208590a49c52272722a89d41d5b13f35858bca310f1a83c6c19}
      - UVICORN_WORKERS=1
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - SETGID
      - SETUID
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - coolify

networks:
  coolify:
    external: true
