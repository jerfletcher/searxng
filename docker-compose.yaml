services:
  redis:
    container_name: searxng-redis
    image: docker.io/valkey/valkey:8-alpine
    command: valkey-server --save 30 1 --loglevel warning
    restart: unless-stopped
    volumes:
      - valkey-data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

  searxng:
    container_name: searxng
    image: docker.io/searxng/searxng:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SEARXNG_SETTINGS_USE_DEFAULT=true
      - SEARXNG_BASE_URL=https://search-lan.0mod.com/
      - SEARXNG_SERVER_LIMITER_ENABLED=false
      - SEARXNG_SECRET_KEY=-t4NusCF1LKD0qlUX8z-ZZmSrMH4UgQvg49pWiwQGyo
      - GRANIAN_WORKERS=2
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "1"

volumes:
  valkey-data:
